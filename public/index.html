<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedo</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="app-layout" id="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div class="page-header">
      <h1 id="videos-heading">All Videos</h1>
      <div style="display:flex; align-items:center; gap:10px;">
        <span id="video-count" style="font-size:13px; color:var(--text-secondary);"></span>
        <button class="btn btn-primary" id="new-video-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Video
        </button>
        <button class="btn btn-ghost" id="logout-btn">Sign Out</button>
      </div>
    </div>
    <div id="videos-grid" class="projects-grid">
      <div style="grid-column:1/-1; text-align:center; padding:60px; color:var(--text-secondary);">
        <div class="spinner" style="margin: 0 auto 12px;"></div>
        <div>Loading videos…</div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="video/*" style="display:none;" />
<div id="toast-container"></div>
<div id="modal-backdrop"></div>

<script src="/utils.js"></script>
<script src="/sidebar.js"></script>
<script src="/dashboard.js"></script>
</body>
</html>
