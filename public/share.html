<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Review — Feedo</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="share-layout" id="share-layout">

  <!-- Header -->
  <header class="share-header">
    <div class="share-logo">
      <img src="/logo.png" alt="Feedo" style="height:22px; width:22px; object-fit:contain; display:block;" />
      Feedo
    </div>
    <div style="width:1px; height:16px; background:var(--border);"></div>
    <div class="share-header-info">
      <div class="share-project-breadcrumb" id="project-breadcrumb">Loading…</div>
      <div class="share-video-name" id="video-name">Loading…</div>
    </div>
    <div class="share-badge" id="share-badge">Shared View</div>
  </header>

  <!-- Workspace -->
  <div class="share-workspace">

    <!-- Video Side -->
    <div class="video-side">
      <div class="video-wrapper">
        <video id="video-el" preload="metadata"></video>
      </div>

      <!-- Custom Controls -->
      <div class="video-controls">
        <div class="progress-track" id="progress-track">
          <div class="progress-track-bg" id="progress-track-bg">
            <div class="progress-track-fill" id="progress-track-fill"></div>
          </div>
          <div class="progress-track-handle" id="progress-track-handle"></div>
        </div>
        <div class="controls-row">
          <button class="ctrl-btn play-btn" title="Play/Pause">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
          </button>
          <button class="ctrl-btn mute-btn" title="Mute">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
          </button>
          <input type="range" class="vol-slider" min="0" max="1" step="0.02" value="1" title="Volume" />
          <div class="time-display">
            <span class="current">0:00</span> / --:--
          </div>
          <div class="ctrl-spacer"></div>
          <button class="ctrl-btn fullscreen-btn" title="Fullscreen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 3 21 3 21 9"/>
              <polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/>
              <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Version Bar (shown if versions exist) -->
      <div class="version-bar" id="version-bar" style="display:none;">
        <div class="version-tabs" id="version-tabs"></div>
      </div>
    </div>

    <!-- Comments Panel -->
    <div class="comments-panel">
      <div class="panel-header">
        <div class="panel-title">
          Comments
          <span class="comment-count-badge" id="comment-count-badge">0</span>
        </div>
        <div class="comment-filter-row" id="comment-filter-row" style="display:none;">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="open">Open</button>
          <button class="filter-btn" data-filter="resolved">Resolved</button>
        </div>
      </div>

      <div class="comments-list" id="comments-list">
        <div style="text-align:center; padding:40px; color:var(--text-secondary);">
          <div class="spinner" style="margin: 0 auto 12px;"></div>
        </div>
      </div>

      <!-- Comment form (shown if allow_comments = 1) -->
      <div class="add-comment-area" id="add-comment-area" style="display:none;">
        <div id="comment-at-badge" class="comment-at-badge" style="display:none;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Commenting at <strong id="comment-at-time">0:00</strong>
        </div>
        <textarea
          class="comment-textarea"
          id="comment-text"
          placeholder="Click to pause &amp; comment…"
          rows="3"
        ></textarea>
        <div class="comment-form-footer">
          <div class="ctrl-spacer"></div>
          <button class="btn btn-primary" id="submit-comment" style="font-size:13px; padding:7px 16px;">
            Add Comment
          </button>
        </div>
      </div>

      <!-- View only note (shown if allow_comments = 0) -->
      <div class="shared-view-note" id="view-only-note" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline; vertical-align:middle; margin-right:5px;">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        View only — comments are disabled for this video.
      </div>

    </div>

  </div><!-- /share-workspace -->
</div><!-- /share-layout -->

<div id="toast-container"></div>
<div id="modal-backdrop"></div>

<script src="/utils.js"></script>
<script src="/share.js"></script>
</body>
</html>
